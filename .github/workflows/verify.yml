name: CarbonGate verification

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-posix:
    name: JDK 21 verification (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-14
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4, MIT

      - name: Install pinned JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4, MIT
        with:
          distribution: temurin
          java-version: "21"

      - name: Run complete verification
        run: ./scripts/verify.sh

      - name: Verify npm adapter
        run: ./scripts/npm-test.sh

  verify-windows:
    name: JDK 21 Windows source and package installers
    runs-on: windows-2022
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4, MIT

      - name: Install pinned JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4, MIT
        with:
          distribution: temurin
          java-version: "21"

      - name: Verify source installer
        shell: pwsh
        run: |
          $env:CARBON_HOME = Join-Path $env:RUNNER_TEMP "carbon-source-home"
          $prefix = Join-Path $env:RUNNER_TEMP "carbon-source"
          & .\scripts\install.ps1 -Prefix $prefix -Setup
          if ($LASTEXITCODE -ne 0) { throw "Source installer failed" }
          & (Join-Path $prefix "bin\carbon.cmd") version
          if ($LASTEXITCODE -ne 0) { throw "Source launcher failed" }
          & (Join-Path $prefix "bin\carbon.cmd") doctor
          if ($LASTEXITCODE -ne 0) { throw "Source installation doctor failed" }

      - name: Verify optional Enterprise Component Host compilation
        shell: pwsh
        run: |
          & .\scripts\build-enterprise.ps1
          if ($LASTEXITCODE -ne 0) { throw "Enterprise Component Host build failed" }
          & .\build\carbon-enterprise.cmd version
          if ($LASTEXITCODE -ne 0) { throw "Enterprise Component Host launcher failed" }
          & .\scripts\build-pack.ps1
          if ($LASTEXITCODE -ne 0) { throw "Rule Pack build failed" }
          & .\scripts\build-provider.ps1
          if ($LASTEXITCODE -ne 0) { throw "Sensitive Data Provider build failed" }
          & .\scripts\build-sandbox.ps1
          if ($LASTEXITCODE -ne 0) { throw "Container Sandbox Provider build failed" }
          & .\scripts\build-approval.ps1
          if ($LASTEXITCODE -ne 0) { throw "Approval Policy Provider build failed" }
          & .\scripts\build-audit.ps1
          if ($LASTEXITCODE -ne 0) { throw "Enterprise Audit Provider build failed" }

      - name: Verify prebuilt package installer
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP "carbongate-package"
          New-Item -ItemType Directory -Force -Path (Join-Path $stage "bin") | Out-Null
          Copy-Item .\build\carbongate.jar (Join-Path $stage "bin\carbongate.jar")
          Copy-Item .\scripts\install-package.ps1 (Join-Path $stage "install.ps1")
          $env:CARBON_HOME = Join-Path $env:RUNNER_TEMP "carbon-package-home"
          $prefix = Join-Path $env:RUNNER_TEMP "carbon-package"
          & (Join-Path $stage "install.ps1") -Prefix $prefix -Setup
          if ($LASTEXITCODE -ne 0) { throw "Package installer failed" }
          & (Join-Path $prefix "bin\carbon.cmd") version
          if ($LASTEXITCODE -ne 0) { throw "Package launcher failed" }
          & (Join-Path $prefix "bin\carbon.cmd") doctor
          if ($LASTEXITCODE -ne 0) { throw "Package installation doctor failed" }
          & (Join-Path $prefix "bin\carbon.cmd") config set mode WARN | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "Unable to prepare configuration preservation test" }
          & (Join-Path $stage "install.ps1") -Prefix $prefix
          if ($LASTEXITCODE -ne 0) { throw "Package reinstall failed" }
          $mode = & (Join-Path $prefix "bin\carbon.cmd") mode show
          if ($mode -notmatch '"mode":"warn"') { throw "Package reinstall overwrote carbon.conf" }

      - name: Verify Windows release bootstrap
        shell: pwsh
        run: .\scripts\distribution-test.ps1

      - name: Verify npm adapter
        shell: pwsh
        run: .\scripts\npm-test.ps1

  verify-native:
    name: Native CLI verification (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: macos-15
            platform: darwin-arm64
          - os: windows-2022
            platform: windows-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4, MIT

      - name: Install GraalVM Community 25.1 native builder
        uses: graalvm/setup-graalvm@0def53c0fd8534bc13416c9469f5be45265824fd # v1, UPL-1.0
        with:
          version: "25.1"
          java-version: "25.0.3"
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify native executable and release archive
        shell: bash
        env:
          CARBON_PLATFORM: ${{ matrix.platform }}
        run: |
          ./scripts/native-test.sh
          ./scripts/package-native.sh
