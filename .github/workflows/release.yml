name: Manual CarbonGate release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version from VERSION, without the v prefix
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate and create draft release
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4, MIT

      - name: Validate the explicit release request
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          test "$GITHUB_REF" = refs/heads/main || {
            echo "Releases must be dispatched from main." >&2
            exit 1
          }
          test "$(tr -d '[:space:]' < VERSION)" = "$VERSION_INPUT" || {
            echo "VERSION does not match the requested release." >&2
            exit 1
          }
          printf '%s\n' "$VERSION_INPUT" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([+-][A-Za-z0-9.-]+)?$'
          if gh release view "v$VERSION_INPUT" >/dev/null 2>&1; then
            test "$(gh release view "v$VERSION_INPUT" --json isDraft --jq .isDraft)" = true || {
              echo "Release v$VERSION_INPUT already exists and is public." >&2
              exit 1
            }
          else
            gh release create "v$VERSION_INPUT" --draft --target "$GITHUB_SHA" \
              --title "CarbonGate v$VERSION_INPUT" --generate-notes
          fi

  native-assets:
    name: Build ${{ matrix.platform }} release asset
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux-x64
          - os: macos-15
            platform: darwin-arm64
          - os: windows-2022
            platform: windows-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Check out release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4, MIT

      - name: Install pinned GraalVM Community Native Image
        uses: graalvm/setup-graalvm@0def53c0fd8534bc13416c9469f5be45265824fd # v1, UPL-1.0
        with:
          java-version: "25.0.3"
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, verify, and upload platform asset
        shell: bash
        env:
          CARBON_PLATFORM: ${{ matrix.platform }}
          GH_TOKEN: ${{ github.token }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          ./scripts/native-test.sh
          asset=$(./scripts/package-native.sh "$VERSION_INPUT")
          gh release upload "v$VERSION_INPUT" "$asset" "$asset.sha256" --clobber

  jvm-assets:
    name: Build portable JVM release assets
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4, MIT

      - name: Install pinned JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4, MIT
        with:
          distribution: temurin
          java-version: "21"

      - name: Build, verify, and upload JVM assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          ./scripts/verify.sh
          ./scripts/package.sh "$VERSION_INPUT"
          cd build
          shasum -a 256 "carbongate-$VERSION_INPUT.tar.gz" > "carbongate-$VERSION_INPUT.tar.gz.sha256"
          shasum -a 256 "carbongate-$VERSION_INPUT.zip" > "carbongate-$VERSION_INPUT.zip.sha256"
          gh release upload "v$VERSION_INPUT" \
            "carbongate-$VERSION_INPUT.tar.gz" "carbongate-$VERSION_INPUT.tar.gz.sha256" \
            "carbongate-$VERSION_INPUT.zip" "carbongate-$VERSION_INPUT.zip.sha256" --clobber

  publish:
    name: Publish verified release
    needs:
      - native-assets
      - jvm-assets
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Consolidate checksums and publish
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          mkdir checksums
          gh release download "v$VERSION_INPUT" --repo "$GITHUB_REPOSITORY" \
            --pattern '*.sha256' --dir checksums
          cd checksums
          cat ./*.sha256 | sort -k 2 > SHA256SUMS
          gh release upload "v$VERSION_INPUT" SHA256SUMS --repo "$GITHUB_REPOSITORY" --clobber
          gh release edit "v$VERSION_INPUT" --repo "$GITHUB_REPOSITORY" --draft=false --latest
